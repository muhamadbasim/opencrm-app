{{- if and .Values.api.enabled .Values.pdb.api.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "scalebiz.fullname" . }}-api
  labels:
    {{- include "scalebiz.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.pdb.api.minAvailable }}
  selector:
    matchLabels:
      {{- include "scalebiz.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
---
{{- end }}
{{- if and .Values.frontend.enabled .Values.pdb.frontend.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "scalebiz.fullname" . }}-frontend
  labels:
    {{- include "scalebiz.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  minAvailable: {{ .Values.pdb.frontend.minAvailable }}
  selector:
    matchLabels:
      {{- include "scalebiz.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
{{- end }}
