{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scalebiz.fullname" . }}-api
  labels:
    {{- include "scalebiz.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  minReadySeconds: {{ .Values.api.minReadySeconds }}
  progressDeadlineSeconds: {{ .Values.api.progressDeadlineSeconds }}
  revisionHistoryLimit: {{ .Values.api.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.api.updateStrategy.type }}
    {{- if and (eq .Values.api.updateStrategy.type "RollingUpdate") .Values.api.updateStrategy.rollingUpdate }}
    rollingUpdate:
      maxUnavailable: {{ .Values.api.updateStrategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.api.updateStrategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "scalebiz.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      {{- with .Values.global.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "scalebiz.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3010
            - name: socket
              containerPort: 3011
          env:
            - name: APP_MODE
              value: api
            {{- range $key, $value := .Values.api.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "scalebiz.fullname" . }}-env
            - secretRef:
                name: {{ .Values.global.secretName }}
          {{- if gt (int .Values.api.lifecycle.preStopSeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep {{ .Values.api.lifecycle.preStopSeconds }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
